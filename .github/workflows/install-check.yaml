name: Check Installation Setup

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-installation:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Setup Package Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: install

      - name: Install pgdcm (from source)
        run: install.packages(".", repos = NULL, type = "source")
        shell: Rscript {0}

      - name: Verify pgdcm loads correctly into memory
        run: library(pgdcm)
        shell: Rscript {0}
